name: Monthly figure scrape (project-page og:image)

on:
  schedule:
    # 1st of every month 05:00 UTC (after enrich + venues).
    - cron: '0 5 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  figures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Extract figure URLs from project pages
        run: npm run figures

      - name: Commit & push if papers.json changed
        id: commit
        run: |
          git config user.name "RitteAnnti818"
          git config user.email "heeyun29@icloud.com"
          if git diff --quiet -- src/data/papers.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes; nothing to commit."
          else
            git add src/data/papers.json
            git commit -m "chore(data): refresh thumbnail figureUrls"
            # Rebase-and-retry so a concurrent commit to main can't drop our data.
            pushed=0
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push origin HEAD:main && { pushed=1; break; }
              sleep $((i * 5))
            done
            [ "$pushed" = 1 ] || { echo "push failed after retries"; exit 1; }
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
