name: Weekly 3D shape generation crawl

on:
  schedule:
    # Every Monday 03:00 UTC.
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      from:
        description: 'Start date YYYYMMDD (default: last 60 days)'
        required: false
      max:
        description: 'Max papers to tag (cost cap)'
        required: false
        default: '120'

permissions:
  contents: write
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Crawl + tag
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.from }}" ]; then ARGS="$ARGS --from=${{ inputs.from }}"; fi
          if [ -n "${{ inputs.max }}" ]; then ARGS="$ARGS --max=${{ inputs.max }}"; fi
          npm run crawl -- $ARGS

      - name: Promote new candidates into papers.json
        run: npm run promote

      - name: Commit & push if data changed
        id: commit
        run: |
          # Attribute auto-commits to the repo owner so the contributor
          # graph shows only the human (no github-actions[bot]).
          git config user.name "RitteAnnti818"
          git config user.email "heeyun29@icloud.com"
          if git diff --quiet -- src/data/papers.json src/data/candidates.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes; nothing to commit."
          else
            git add src/data/papers.json src/data/candidates.json
            git commit -m "chore(data): auto-promote new 3D shape generation papers from arXiv"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
